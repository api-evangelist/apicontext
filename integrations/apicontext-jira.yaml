naftiko: 1.0.0-alpha2
info:
  label: File Jira issues from APIContext regressions
  description: When APIContext detects a conformance failure or repeating regression on a monitored API, automatically file a Jira issue in the owning team's project with the failing endpoint, the diff against last-good behavior, and a link back to APIContext insights.
  tags:
  - APIContext
  - Integration
  - Project tracking
  - jira
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APICONTEXT_API_KEY: APICONTEXT_API_KEY
    JIRA_API_KEY: JIRA_API_KEY
capability:
  consumes:
  - type: http
    namespace: apicontext
    baseUri: https://client.apimetrics.io/api/2
    description: APIContext API operations consumed by this integration.
    resources:
    - name: insights-call-call-id
      path: /insights/call/{call_id}/
      operations:
      - name: getcallinsights
        method: GET
        description: Get the APIContext insights report describing the regression.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
    - name: calls-call-id
      path: /calls/{call_id}
      operations:
      - name: getapicall
        method: GET
        description: Get the API call configuration to enrich the issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
  - type: http
    namespace: jira
    baseUri: https://yourorg.atlassian.net
    description: Jira Cloud REST API operations consumed by this integration.
    resources:
    - name: rest-api-3-issue
      path: /rest/api/3/issue
      operations:
      - name: createissue
        method: POST
        description: 'Jira Cloud REST API: createIssue'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: apicontext-jira-mcp
    description: MCP adapter for the apicontext-jira integration.
    tools:
    - name: apicontext_jira
      description: Execute the apicontext jira integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: apicontext-jira-rest
    port: 8080
    description: REST adapter for the apicontext-jira integration.
    resources:
    - path: /apicontext-jira
      name: apicontext-jira
      description: REST surface for the apicontext-jira integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the apicontext-jira integration.
        call: apicontext_jira
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
