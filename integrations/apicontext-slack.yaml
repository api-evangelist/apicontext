naftiko: 1.0.0-alpha2
info:
  label: Post APIContext alerts to Slack
  description: When APIContext fires an alert (latency regression, SLO breach, conformance failure) post a formatted message to the right Slack channel so the API team sees the issue in real time alongside the offending endpoint and recent stats.
  tags:
  - APIContext
  - Integration
  - Collaboration
  - slack
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APICONTEXT_API_KEY: APICONTEXT_API_KEY
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: apicontext
    baseUri: https://client.apimetrics.io/api/2
    description: APIContext API operations consumed by this integration.
    resources:
    - name: alerts-alert-id
      path: /alerts/{alert_id}
      operations:
      - name: getalert
        method: GET
        description: Get the alert that fired.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: alert_id
          in: path
          type: string
          description: Path parameter alert_id.
          required: true
    - name: calls-call-id-stats
      path: /calls/{call_id}/stats/
      operations:
      - name: getcallstats
        method: GET
        description: Get recent performance stats for the offending call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
  - type: http
    namespace: slack
    baseUri: https://slack.com
    description: Slack Web API operations consumed by this integration.
    resources:
    - name: api-chat-postmessage
      path: /api/chat.postMessage
      operations:
      - name: postmessage
        method: POST
        description: 'Slack Web API: postMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: apicontext-slack-mcp
    description: MCP adapter for the apicontext-slack integration.
    tools:
    - name: apicontext_slack
      description: Execute the apicontext slack integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: apicontext-slack-rest
    port: 8080
    description: REST adapter for the apicontext-slack integration.
    resources:
    - path: /apicontext-slack
      name: apicontext-slack
      description: REST surface for the apicontext-slack integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the apicontext-slack integration.
        call: apicontext_slack
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
