naftiko: 1.0.0-alpha2
info:
  label: Forward APIContext SLO breaches into Datadog
  description: When APIContext detects an SLO breach or regression for a monitored API, push it into Datadog as a custom event and tagged metric so SRE dashboards and alerting policies treat synthetic signal as first-class telemetry alongside in-process metrics.
  tags:
  - APIContext
  - Integration
  - Observability
  - datadog
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APICONTEXT_API_KEY: APICONTEXT_API_KEY
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: apicontext
    baseUri: https://client.apimetrics.io/api/2
    description: APIContext API operations consumed by this integration.
    resources:
    - name: insights-call-call-id
      path: /insights/call/{call_id}/
      operations:
      - name: getcallinsights
        method: GET
        description: Get the APIContext insights report (SLO compliance, regressions, anomalies) for an API call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
    - name: calls-call-id-stats
      path: /calls/{call_id}/stats/
      operations:
      - name: getcallstats
        method: GET
        description: Get aggregated performance stats for an API call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
  - type: http
    namespace: datadog
    baseUri: https://api.datadoghq.com
    description: Datadog API operations consumed by this integration.
    resources:
    - name: api-v1-events
      path: /api/v1/events
      operations:
      - name: createevent
        method: POST
        description: 'Datadog API: createEvent'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-series
      path: /api/v2/series
      operations:
      - name: submitmetric
        method: POST
        description: 'Datadog API: submitMetric'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: apicontext-datadog-mcp
    description: MCP adapter for the apicontext-datadog integration.
    tools:
    - name: apicontext_datadog
      description: Execute the apicontext datadog integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: apicontext-datadog-rest
    port: 8080
    description: REST adapter for the apicontext-datadog integration.
    resources:
    - path: /apicontext-datadog
      name: apicontext-datadog
      description: REST surface for the apicontext-datadog integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the apicontext-datadog integration.
        call: apicontext_datadog
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
