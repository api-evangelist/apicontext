naftiko: 1.0.0-alpha2
info:
  label: Emit APIContext synthetic spans as OpenTelemetry traces
  description: Convert APIContext synthetic call executions into OpenTelemetry spans (one root span per call, child spans per stage) and ship them to any OTLP-compatible backend so synthetic monitoring data lives next to in-process traces in the same trace store.
  tags:
  - APIContext
  - Integration
  - Telemetry
  - opentelemetry
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APICONTEXT_API_KEY: APICONTEXT_API_KEY
    OPENTELEMETRY_API_KEY: OPENTELEMETRY_API_KEY
capability:
  consumes:
  - type: http
    namespace: apicontext
    baseUri: https://client.apimetrics.io/api/2
    description: APIContext API operations consumed by this integration.
    resources:
    - name: results-call-call-id
      path: /results/call/{call_id}/
      operations:
      - name: getcallresults
        method: GET
        description: Pull raw APIContext result records to translate into spans.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
    - name: calls-call-id-stats
      path: /calls/{call_id}/stats/
      operations:
      - name: getcallstats
        method: GET
        description: Get summary stats for the span attributes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
  - type: http
    namespace: opentelemetry
    baseUri: https://otel-collector.yourorg.com
    description: OpenTelemetry OTLP HTTP operations consumed by this integration.
    resources:
    - name: v1-traces
      path: /v1/traces
      operations:
      - name: exporttraces
        method: POST
        description: 'OpenTelemetry OTLP HTTP: exportTraces'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: apicontext-opentelemetry-mcp
    description: MCP adapter for the apicontext-opentelemetry integration.
    tools:
    - name: apicontext_opentelemetry
      description: Execute the apicontext opentelemetry integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: apicontext-opentelemetry-rest
    port: 8080
    description: REST adapter for the apicontext-opentelemetry integration.
    resources:
    - path: /apicontext-opentelemetry
      name: apicontext-opentelemetry
      description: REST surface for the apicontext-opentelemetry integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the apicontext-opentelemetry integration.
        call: apicontext_opentelemetry
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
