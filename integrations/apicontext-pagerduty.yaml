naftiko: 1.0.0-alpha2
info:
  label: Page on-call from APIContext SLO breaches
  description: When APIContext detects an SLO breach or sustained availability drop for a critical API, fire a PagerDuty incident so the right on-call engineer is paged with the offending endpoint, region, and recent error pattern.
  tags:
  - APIContext
  - Integration
  - Incident response
  - pagerduty
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APICONTEXT_API_KEY: APICONTEXT_API_KEY
    PAGERDUTY_API_KEY: PAGERDUTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: apicontext
    baseUri: https://client.apimetrics.io/api/2
    description: APIContext API operations consumed by this integration.
    resources:
    - name: insights-call-call-id
      path: /insights/call/{call_id}/
      operations:
      - name: getcallinsights
        method: GET
        description: Get the APIContext insights report for an API call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
    - name: alerts
      path: /alerts/
      operations:
      - name: listalerts
        method: GET
        description: List alert rules to enrich the incident with rule context.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: pagerduty
    baseUri: https://events.pagerduty.com
    description: PagerDuty Events API v2 operations consumed by this integration.
    resources:
    - name: v2-enqueue
      path: /v2/enqueue
      operations:
      - name: triggerincident
        method: POST
        description: 'PagerDuty Events API v2: triggerIncident'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: apicontext-pagerduty-mcp
    description: MCP adapter for the apicontext-pagerduty integration.
    tools:
    - name: apicontext_pagerduty
      description: Execute the apicontext pagerduty integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: apicontext-pagerduty-rest
    port: 8080
    description: REST adapter for the apicontext-pagerduty integration.
    resources:
    - path: /apicontext-pagerduty
      name: apicontext-pagerduty
      description: REST surface for the apicontext-pagerduty integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the apicontext-pagerduty integration.
        call: apicontext_pagerduty
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
