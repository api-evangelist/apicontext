naftiko: 1.0.0-alpha2
info:
  label: Block APIContext monitor creation on Spectral lint failures
  description: Before creating or updating an APIContext monitor for an OpenAPI-described endpoint, run the spec through Spectral. If governance rules fail, refuse to create the monitor and surface the violations so APIContext only monitors APIs that meet design-time standards.
  tags:
  - APIContext
  - Integration
  - API tooling
  - spectral
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    APICONTEXT_API_KEY: APICONTEXT_API_KEY
    SPECTRAL_API_KEY: SPECTRAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: apicontext
    baseUri: https://client.apimetrics.io/api/2
    description: APIContext API operations consumed by this integration.
    resources:
    - name: calls
      path: /calls/
      operations:
      - name: createapicall
        method: POST
        description: Create the APIContext monitor once the spec passes Spectral.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: calls-call-id
      path: /calls/{call_id}
      operations:
      - name: updateapicall
        method: PUT
        description: Update the APIContext monitor when the spec passes Spectral.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call_id
          in: path
          type: string
          description: Path parameter call_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: spectral
    baseUri: https://api.stoplight.io
    description: Spectral / Stoplight API operations consumed by this integration.
    resources:
    - name: v1-lint
      path: /v1/lint
      operations:
      - name: lintspec
        method: POST
        description: 'Spectral / Stoplight API: lintSpec'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: apicontext-spectral-mcp
    description: MCP adapter for the apicontext-spectral integration.
    tools:
    - name: apicontext_spectral
      description: Execute the apicontext spectral integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: apicontext-spectral-rest
    port: 8080
    description: REST adapter for the apicontext-spectral integration.
    resources:
    - path: /apicontext-spectral
      name: apicontext-spectral
      description: REST surface for the apicontext-spectral integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the apicontext-spectral integration.
        call: apicontext_spectral
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
