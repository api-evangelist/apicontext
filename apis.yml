apis:
  - aid: apicontext:synthetic-api-testing
    name: APIContext Synthetic API Testing
    description: >-
      APIContext provides synthetic API testing and monitoring that continuously
      tests APIs from multiple global locations to measure performance, validate
      responses against expected schemas, and enforce SLO thresholds with alerting
      and dashboards.
